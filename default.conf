server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve existing files or files with .html extension
    location / {
        try_files $uri $uri.html @redirect_root;
    }

    # Redirect unknown URLs to homepage
    location @redirect_root {
        if ($request_uri != "/") {
            return 302 /;
        }
    }
}